<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科研计划板</title>
<style>
  :root {
    --bg-start: #f5e6f0;
    --bg-end: #dce8f5;
    --glass: rgba(255,255,255,0.65);
    --glass-border: rgba(255,255,255,0.5);
    --glass-shadow: 0 4px 16px rgba(0,0,0,0.05), 0 1px 4px rgba(0,0,0,0.02);
    --glass-hover-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.03);
    --text-primary: #1d1d1f;
    --text-secondary: #86868b;
    --text-tertiary: #aeaeb2;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --accent-active: #006edb;
    --green: #34c759;
    --green-bg: rgba(52,199,89,0.1);
    --orange: #ff9500;
    --orange-bg: rgba(255,149,0,0.1);
    --red: #ff3b30;
    --red-bg: rgba(255,59,48,0.1);
    --radius: 16px;
    --radius-sm: 10px;
    --blur: blur(24px) saturate(180%);
    --transition: 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background: linear-gradient(160deg, var(--bg-start) 0%, #eddff0 30%, #e3eaf5 60%, var(--bg-end) 100%);
    background-attachment: fixed;
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(245,220,240,0.4) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 80% 90%, rgba(200,220,245,0.4) 0%, transparent 70%);
    pointer-events:none;
    z-index:0;
  }
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,0.2)}

  /* ─── Glass Mixin ─── */
  .glass{
    background: var(--glass);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
  }

  /* ─── Header ─── */
  .header{
    position:sticky;
    top:0;
    z-index:20;
    background: rgba(255,255,255,0.5);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border-bottom: 1px solid rgba(255,255,255,0.3);
    padding: 1.6rem 1.5rem 1rem;
    text-align: center;
  }
  .header h1{font-size:1.45rem;font-weight:600;letter-spacing:0.5px;color:var(--text-primary)}
  .header h1 span{color:var(--accent)}
  .header .subtitle{color:var(--text-secondary);font-size:.82rem;margin-top:.35rem;font-weight:400}

  /* ─── Tabs ─── */
  .tabs{
    display:flex;
    gap:0;
    justify-content:center;
    position:sticky;
    top:68px;
    z-index:15;
    background: rgba(255,255,255,0.35);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border-bottom: 1px solid rgba(255,255,255,0.25);
    padding:0 1rem;
  }
  .tab{
    position:relative;
    padding:.75rem 1.6rem;
    font-size:.88rem;
    cursor:pointer;
    color:var(--text-secondary);
    white-space:nowrap;
    user-select:none;
    transition: color var(--transition);
    font-weight:400;
  }
  .tab:hover{color:var(--text-primary)}
  .tab.active{color:var(--accent);font-weight:500}
  .tab-indicator{
    position:absolute;
    bottom:0;
    height:2.5px;
    background:var(--accent);
    border-radius:2px 2px 0 0;
    transition: left var(--transition), width var(--transition);
  }

  /* ─── Container ─── */
  .container{max-width:780px;margin:0 auto;padding:1.5rem 1rem;position:relative;z-index:1}
  .tab-content{display:none}
  .tab-content.active{display:block}

  /* ─── Slide Animation ─── */
  .tab-content.slide-in{animation:slideIn 0.4s cubic-bezier(0.25,0.1,0.25,1) forwards}
  .tab-content.slide-out{animation:slideOut 0.3s cubic-bezier(0.25,0.1,0.25,1) forwards}
  @keyframes slideIn{
    from{opacity:0;transform:translateX(24px)}
    to{opacity:1;transform:translateX(0)}
  }
  @keyframes slideOut{
    from{opacity:1;transform:translateX(0)}
    to{opacity:0;transform:translateX(-24px)}
  }
  @keyframes slideInReverse{
    from{opacity:0;transform:translateX(-24px)}
    to{opacity:1;transform:translateX(0)}
  }
  @keyframes slideOutReverse{
    from{opacity:1;transform:translateX(0)}
    to{opacity:0;transform:translateX(24px)}
  }

  /* ─── Cards ─── */
  .card{
    background: var(--glass);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.2rem;
    transition: box-shadow var(--transition), transform var(--transition);
  }
  .card:hover{
    box-shadow: var(--glass-hover-shadow);
    transform: translateY(-1px);
  }
  .card-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:1.1rem;
  }
  .card-title{
    font-size:1rem;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:.5rem;
    color:var(--text-primary);
  }
  .card-title .badge{
    font-size:.68rem;
    background:var(--accent);
    color:#fff;
    border-radius:20px;
    padding:.12rem .55rem;
    font-weight:500;
    letter-spacing:0.3px;
  }

  /* ─── Date Input ─── */
  .date-row{display:flex;gap:.6rem;margin-bottom:1.1rem;align-items:center}
  .date-row label{font-size:.82rem;color:var(--text-secondary);flex-shrink:0}
  .date-input{
    background:rgba(255,255,255,0.5);
    border:1px solid rgba(0,0,0,0.08);
    border-radius:var(--radius-sm);
    color:var(--text-primary);
    padding:.45rem .7rem;
    font-size:.85rem;
    font-family:inherit;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .date-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,0.12)}

  /* ─── Items List ─── */
  .items{list-style:none}
  .item{
    display:flex;
    align-items:center;
    gap:.7rem;
    padding:.5rem 0;
    border-bottom:1px solid rgba(0,0,0,0.04);
    animation:itemFadeIn 0.3s ease;
  }
  @keyframes itemFadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .item:last-child{border-bottom:none}

  .item input[type=checkbox]{
    appearance:none;
    -webkit-appearance:none;
    width:20px;height:20px;
    border:2px solid rgba(0,0,0,0.15);
    border-radius:5px;
    cursor:pointer;
    flex-shrink:0;
    position:relative;
    transition: all 0.25s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  .item input[type=checkbox]:checked{
    background:var(--accent);
    border-color:var(--accent);
    transform:scale(1.08);
  }
  .item input[type=checkbox]:checked::after{
    content:'✓';
    color:#fff;
    font-size:13px;
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-weight:700;
  }
  .item input[type=checkbox]:hover{border-color:var(--accent)}
  .item .text{
    flex:1;
    background:transparent;
    border:none;
    color:var(--text-primary);
    font-size:.9rem;
    padding:.2rem 0;
    font-family:inherit;
    min-width:0;
    transition: color var(--transition);
  }
  .item .text:focus{outline:none}
  .item .text.done{text-decoration:line-through;color:var(--text-tertiary)}
  .item .priority-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .item .priority-dot.p1{background:var(--red)}
  .item .priority-dot.p2{background:var(--orange)}
  .item .priority-dot.p3{background:var(--green)}
  .delete-btn{
    background:none;
    border:none;
    color:var(--text-tertiary);
    cursor:pointer;
    font-size:1rem;
    padding:0 .2rem;
    flex-shrink:0;
    opacity:0;
    transition: opacity var(--transition), color var(--transition);
  }
  .item:hover .delete-btn{opacity:1}
  .delete-btn:hover{color:var(--red)}

  .add-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:.4rem;
    background:transparent;
    border:1px dashed rgba(0,0,0,0.1);
    border-radius:var(--radius-sm);
    color:var(--text-secondary);
    padding:.55rem;
    width:100%;
    cursor:pointer;
    font-size:.83rem;
    font-family:inherit;
    margin-top:.5rem;
    transition: all var(--transition);
  }
  .add-btn:hover{
    border-color:var(--accent);
    color:var(--accent);
    background:rgba(0,113,227,0.04);
  }

  /* ─── Note ─── */
  .note{
    width:100%;
    background:rgba(255,255,255,0.5);
    border:1px solid rgba(0,0,0,0.08);
    border-radius:var(--radius-sm);
    color:var(--text-primary);
    padding:.7rem;
    font-size:.85rem;
    resize:vertical;
    min-height:68px;
    font-family:inherit;
    margin-top:.7rem;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .note:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,0.12)}
  .note::placeholder{color:var(--text-tertiary)}

  /* ─── Actions ─── */
  .actions{display:flex;gap:.7rem;margin-top:1.1rem}
  .btn{
    flex:1;
    padding:.6rem 1rem;
    border:none;
    border-radius:100px;
    font-size:.86rem;
    cursor:pointer;
    font-weight:500;
    transition: all var(--transition);
    font-family:inherit;
  }
  .btn-primary{
    background:var(--accent);
    color:#fff;
  }
  .btn-primary:hover{
    background:var(--accent-hover);
    box-shadow:0 4px 14px rgba(0,113,227,0.25);
    transform:translateY(-1px);
  }
  .btn-primary:active{
    background:var(--accent-active);
    transform:translateY(0);
  }
  .btn-secondary{
    background:rgba(0,0,0,0.04);
    color:var(--text-secondary);
    border:1px solid rgba(0,0,0,0.06);
  }
  .btn-secondary:hover{
    background:rgba(0,0,0,0.08);
    color:var(--text-primary);
  }

  /* ─── Status ─── */
  .status{
    margin-top:.7rem;
    padding:.5rem .8rem;
    border-radius:var(--radius-sm);
    display:none;
    font-size:.83rem;
    animation:fadeInStatus 0.25s ease;
  }
  @keyframes fadeInStatus{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .status.success{
    display:block;
    background:var(--green-bg);
    color:var(--green);
    border:1px solid rgba(52,199,89,0.15);
  }
  .status.error{
    display:block;
    background:var(--red-bg);
    color:var(--red);
    border:1px solid rgba(255,59,48,0.15);
  }

  /* ─── Progress Bar ─── */
  .progress-bar{
    height:4px;
    background:rgba(0,0,0,0.06);
    border-radius:2px;
    overflow:hidden;
    margin:.7rem 0;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg, var(--accent), #5aacff);
    border-radius:2px;
    transition: width 0.6s cubic-bezier(0.25,0.1,0.25,1);
    position:relative;
  }
  .progress-fill::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    animation:shimmer 2s infinite;
  }
  @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
  .progress-text{font-size:.8rem;color:var(--text-secondary);margin-top:.25rem}

  /* ─── Quarterly Sections (Yearly) ─── */
  .quarter{
    background:rgba(255,255,255,0.35);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:var(--radius-sm);
    padding:.8rem 1rem;
    margin-bottom:.6rem;
    transition: border-color var(--transition), box-shadow var(--transition);
  }
  .quarter:hover{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,113,227,0.08)}
  .quarter-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
  .quarter-name{font-size:.85rem;font-weight:600;color:var(--accent)}
  .quarter-count{
    font-size:.73rem;
    color:var(--text-secondary);
    background:rgba(255,255,255,0.5);
    padding:.15rem .45rem;
    border-radius:8px;
  }
  .quarter-items{list-style:none}
  .quarter-items .item{padding:.4rem 0;border-bottom-color:rgba(0,0,0,0.03)}
  .quarter-items .item .text{font-size:.83rem}

  /* ─── Monthly Goals ─── */
  .goal-tag{
    font-size:.68rem;
    padding:.15rem .5rem;
    border-radius:20px;
    flex-shrink:0;
    font-weight:500;
  }
  .goal-tag.paper{background:rgba(0,113,227,0.1);color:var(--accent)}
  .goal-tag.exp{background:var(--green-bg);color:var(--green)}
  .goal-tag.write{background:var(--orange-bg);color:var(--orange)}
  .goal-tag.other{background:rgba(0,0,0,0.04);color:var(--text-secondary)}

  /* ─── History ─── */
  .history{margin-top:1.5rem}
  .history-title{font-size:.88rem;color:var(--text-secondary);margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
  .history-item{
    background:rgba(255,255,255,0.35);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:var(--radius-sm);
    padding:.65rem .9rem;
    margin-bottom:.4rem;
    transition: border-color var(--transition);
  }
  .history-item:hover{border-color:var(--accent)}
  .history-date{color:var(--text-secondary);font-size:.76rem}
  .history-items{color:var(--text-primary);font-size:.82rem;margin-top:.2rem;line-height:1.6}
  .history-items .h-done{color:var(--green)}
  .history-items .h-pending{color:var(--text-secondary)}

  /* ─── Responsive ─── */
  @media(max-width:480px){
    .header{padding:1.2rem 1rem}
    .header h1{font-size:1.2rem}
    .tabs{overflow-x:auto;justify-content:flex-start;gap:0}
    .tab{padding:.65rem 1rem;font-size:.82rem}
    .container{padding:1rem}
    .card{padding:1rem}
    .actions{flex-direction:column}
    .date-row{flex-wrap:wrap}
  }
</style>
</head>
<body>

<div class="header">
  <h1>🔬 科研<span>计划板</span></h1>
  <p class="subtitle">计划 · 追踪 · 复盘 — 你的科研指挥中心</p>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-tab="daily" onclick="switchTab('daily')">📅 明日计划</div>
  <div class="tab" data-tab="monthly" onclick="switchTab('monthly')">📆 本月计划</div>
  <div class="tab" data-tab="yearly" onclick="switchTab('yearly')">📊 本年计划</div>
  <div class="tab-indicator" id="tabIndicator"></div>
</div>

<div class="container" id="container">

<!-- ═══ Daily Tab ═══ -->
<div class="tab-content active" id="tab-daily">
  <div class="card">
    <div class="card-header">
      <div class="card-title">📅 明日计划 <span class="badge">每日</span></div>
    </div>
    <div class="date-row">
      <label>📌 日期</label>
      <input type="date" id="planDate" class="date-input">
    </div>
    <ul class="items" id="items"></ul>
    <button class="add-btn" onclick="addItem('daily')">＋ 添加任务</button>
    <textarea class="note" id="note" placeholder="💬 备注 · 额外说明 · 注意事项 …"></textarea>
    <div class="actions">
      <button class="btn btn-primary" onclick="savePlan()">💾 保存计划</button>
      <button class="btn btn-secondary" onclick="clearPlan()">🗑️ 清空</button>
    </div>
    <div class="status" id="dailyStatus"></div>
  </div>

  <div class="card history" id="historySection">
    <div class="history-title">📜 历史计划</div>
    <div id="history"></div>
  </div>
</div>

<!-- ═══ Monthly Tab ═══ -->
<div class="tab-content" id="tab-monthly">
  <div class="card">
    <div class="card-header">
      <div class="card-title">📆 本月目标 <span class="badge" id="monthLabel">2026-05</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="monthProgress" style="width:0%"></div></div>
    <div class="progress-text" id="monthProgressText">0 / 0 已完成</div>
    <ul class="items" id="monthItems"></ul>
    <button class="add-btn" onclick="addItem('monthly')">＋ 添加本月目标</button>
    <div class="actions" style="margin-top:1rem">
      <button class="btn btn-primary" onclick="saveMonthlyPlan()">💾 保存本月计划</button>
      <button class="btn btn-secondary" onclick="clearMonthlyPlan()">🗑️ 清空</button>
    </div>
    <div class="status" id="monthlyStatus"></div>
  </div>
</div>

<!-- ═══ Yearly Tab ═══ -->
<div class="tab-content" id="tab-yearly">
  <div class="card">
    <div class="card-header">
      <div class="card-title">📊 年度里程碑 <span class="badge" id="yearLabel">2026</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="yearProgress" style="width:0%"></div></div>
    <div class="progress-text" id="yearProgressText">0 / 0 已完成</div>
    <div id="yearQuarters"></div>
    <button class="add-btn" onclick="addYearlyItem()">＋ 添加年度目标</button>
    <div class="actions" style="margin-top:1rem">
      <button class="btn btn-primary" onclick="saveYearlyPlan()">💾 保存年度计划</button>
      <button class="btn btn-secondary" onclick="clearYearlyPlan()">🗑️ 清空</button>
    </div>
    <div class="status" id="yearlyStatus"></div>
  </div>
</div>

</div>

<script>
/* ─── State ─── */
const D = {items:[],note:"",date:"",monthly:[],yearly:[]};
const defaultDate = (d=>{d.setDate(d.getDate()+1);return d.toISOString().split('T')[0]})(new Date());
let tabOrder = ['daily','monthly','yearly'];

/* ─── Tab Switching ─── */
function moveIndicator(name){
  const idx = tabOrder.indexOf(name);
  const tabs = document.querySelectorAll('.tab');
  const indicator = document.getElementById('tabIndicator');
  const activeTab = tabs[idx];
  if(activeTab){
    indicator.style.left = activeTab.offsetLeft + 'px';
    indicator.style.width = activeTab.offsetWidth + 'px';
  }
}

function switchTab(name){
  const oldName = document.querySelector('.tab.active')?.dataset?.tab || 'daily';
  const oldIdx = tabOrder.indexOf(oldName);
  const newIdx = tabOrder.indexOf(name);

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');

  const oldContent = document.getElementById('tab-'+oldName);
  const newContent = document.getElementById('tab-'+name);

  if(oldContent === newContent) return;

  const forward = newIdx > oldIdx;

  oldContent.classList.remove('active','slide-in');
  oldContent.classList.add('slide-out');
  if(forward) oldContent.style.animationName = 'slideOut';
  else oldContent.style.animationName = 'slideOutReverse';

  newContent.classList.remove('slide-out');
  newContent.classList.add('slide-in');
  if(forward) newContent.style.animationName = 'slideIn';
  else newContent.style.animationName = 'slideInReverse';
  newContent.classList.add('active');

  setTimeout(() => {
    oldContent.classList.remove('slide-out');
    oldContent.style.animationName = '';
    newContent.classList.remove('slide-in');
    newContent.style.animationName = '';
  }, 400);

  moveIndicator(name);

  if(name==='monthly')loadMonthlyPlan();
  if(name==='yearly')loadYearlyPlan();
}

/* ─── Helpers ─── */
function escapeHtml(t){return String(t).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function showStatus(id,m,type){const e=document.getElementById(id);e.textContent=m;e.className='status '+type;setTimeout(()=>{e.className='status'},4000)}

/* ─── Daily Items ─── */
function renderDaily(){
  const list=document.getElementById('items');
  list.innerHTML=D.items.map((item,i)=>'<li class="item" style="animation-delay:'+(i*0.04)+'s"><input type="checkbox" '+(item.done?'checked':'')+' onchange="toggleDone('+i+')"><input class="text '+(item.done?'done':'')+'" value="'+escapeHtml(item.text)+'" oninput="updateText('+i+',this.value)" placeholder="写一条任务…"><button class="delete-btn" onclick="removeItem('+i+')">✕</button></li>').join('');
  document.getElementById('note').value=D.note||'';
  document.getElementById('planDate').value=D.date||defaultDate;
}
function addItem(){D.items.push({text:'',done:false});renderDaily();const els=document.querySelectorAll('#items .item .text');els[els.length-1].focus()}
function removeItem(i){D.items.splice(i,1);renderDaily()}
function toggleDone(i){D.items[i].done=!D.items[i].done;renderDaily()}
function updateText(i,v){D.items[i].text=v}
document.getElementById('note').addEventListener('input',function(){D.note=this.value});
document.getElementById('planDate').addEventListener('change',function(){D.date=this.value});

async function savePlan(){
  D.date=document.getElementById('planDate').value||defaultDate;
  D.note=document.getElementById('note').value;
  try{const r=await fetch('/api/plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date:D.date,items:D.items,note:D.note})});await r.json();showStatus('dailyStatus','✅ 已保存！明早播报时会带上','success');loadHistory()}catch(e){showStatus('dailyStatus','❌ 保存失败: '+e.message,'error')}
}
function clearPlan(){if(!confirm('确定清空明日计划？'))return;D={items:[],note:'',date:defaultDate,monthly:D.monthly,yearly:D.yearly};renderDaily()}

async function loadPlan(){
  try{const r=await fetch('/api/plan');const data=await r.json();D.items=data.items||[];D.note=data.note||'';D.date=data.date||defaultDate;renderDaily()}catch(e){}
}

/* ─── Monthly Items ─── */
function renderMonthly(){
  const list=document.getElementById('monthItems');
  const done=D.monthly.filter(i=>i.done).length;
  const total=D.monthly.length;
  list.innerHTML=D.monthly.map((item,i)=>'<li class="item" style="animation-delay:'+(i*0.04)+'s"><input type="checkbox" '+(item.done?'checked':'')+' onchange="toggleMonthlyDone('+i+')"><span class="goal-tag '+(item.tag||'other')+'">'+(item.tag==='paper'?'📄论文':item.tag==='exp'?'🧪实验':item.tag==='write'?'✍️写作':'📌其他')+'</span><input class="text '+(item.done?'done':'')+'" value="'+escapeHtml(item.text)+'" oninput="updateMonthlyText('+i+',this.value)" placeholder="写一条本月目标…"><button class="delete-btn" onclick="removeMonthlyItem('+i+')">✕</button></li>').join('');
  document.getElementById('monthLabel').textContent=(new Date().getFullYear())+'-'+String(new Date().getMonth()+1).padStart(2,'0');
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('monthProgress').style.width=pct+'%';
  document.getElementById('monthProgressText').textContent=done+' / '+total+' 已完成';
}
function addItem(type){
  if(type==='monthly'){D.monthly.push({text:'',done:false,tag:'other'});renderMonthly();const els=document.querySelectorAll('#monthItems .item .text');els[els.length-1].focus()}
}
function toggleMonthlyDone(i){D.monthly[i].done=!D.monthly[i].done;renderMonthly()}
function removeMonthlyItem(i){D.monthly.splice(i,1);renderMonthly()}
function updateMonthlyText(i,v){D.monthly[i].text=v}

async function saveMonthlyPlan(){
  try{const r=await fetch('/api/monthly-plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:D.monthly})});await r.json();showStatus('monthlyStatus','✅ 本月计划已保存','success')}catch(e){showStatus('monthlyStatus','❌ 保存失败: '+e.message,'error')}
}
function clearMonthlyPlan(){if(!confirm('确定清空本月计划？'))return;D.monthly=[];renderMonthly()}
async function loadMonthlyPlan(){
  try{const r=await fetch('/api/monthly-plan');const data=await r.json();D.monthly=data.items||[];renderMonthly()}catch(e){}
}

/* ─── Yearly Items ─── */
function yearQuarter(q){return {1:'Q1 · 1–3月',2:'Q2 · 4–6月',3:'Q3 · 7–9月',4:'Q4 · 10–12月'}[q]||'Q'+q}

function renderYearly(){
  const container=document.getElementById('yearQuarters');
  const all=D.yearly;
  const total=all.length;
  const done=all.filter(i=>i.done).length;
  const pct=total?Math.round(done/total*100):0;

  document.getElementById('yearLabel').textContent=new Date().getFullYear();
  document.getElementById('yearProgress').style.width=pct+'%';
  document.getElementById('yearProgressText').textContent=done+' / '+total+' 已完成';

  let html='';
  for(let q=1;q<=4;q++){
    const items=all.filter(i=>(i.quarter||1)===q);
    if(!items.length)continue;
    const qDone=items.filter(i=>i.done).length;
    html+='<div class="quarter"><div class="quarter-header"><span class="quarter-name">'+yearQuarter(q)+'</span><span class="quarter-count">'+qDone+'/'+items.length+'</span></div><ul class="quarter-items">';
    items.forEach((item,i)=>{
      const idx=all.indexOf(item);
      html+='<li class="item" style="animation-delay:'+(i*0.04)+'s"><input type="checkbox" '+(item.done?'checked':'')+' onchange="toggleYearlyDone('+idx+')"><input class="text '+(item.done?'done':'')+'" value="'+escapeHtml(item.text)+'" oninput="updateYearlyText('+idx+',this.value)" placeholder="年度目标…"><button class="delete-btn" onclick="removeYearlyItem('+idx+')">✕</button></li>';
    });
    html+='</ul></div>';
  }
  container.innerHTML=html||'<p style="color:var(--text-secondary);font-size:.83rem;text-align:center;padding:1rem">还没有年度目标，点下方按钮添加</p>';
}
function addYearlyItem(){
  D.yearly.push({text:'',done:false,quarter:Math.ceil((new Date().getMonth()+1)/3)});
  renderYearly();
  const inputs=document.querySelectorAll('#yearQuarters .item .text');
  inputs[inputs.length-1].focus();
}
function toggleYearlyDone(i){D.yearly[i].done=!D.yearly[i].done;renderYearly()}
function removeYearlyItem(i){D.yearly.splice(i,1);renderYearly()}
function updateYearlyText(i,v){D.yearly[i].text=v}

async function saveYearlyPlan(){
  try{const r=await fetch('/api/yearly-plan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:D.yearly})});await r.json();showStatus('yearlyStatus','✅ 年度计划已保存','success')}catch(e){showStatus('yearlyStatus','❌ 保存失败: '+e.message,'error')}
}
function clearYearlyPlan(){if(!confirm('确定清空年度计划？'))return;D.yearly=[];renderYearly()}
async function loadYearlyPlan(){
  try{const r=await fetch('/api/yearly-plan');const data=await r.json();D.yearly=data.items||[];renderYearly()}catch(e){}
}

/* ─── History ─── */
async function loadHistory(){
  try{const r=await fetch('/api/history');const h=await r.json();const el=document.getElementById('history');
    if(!h||h.length===0){el.innerHTML='<p style="color:var(--text-secondary);font-size:.83rem;text-align:center;padding:.5rem">暂无历史记录</p>';return}
    el.innerHTML=h.slice().reverse().slice(0,10).map(hh=>{
      const its=(hh.items||[]).filter(i=>i.text).map(i=>'<span class="'+(i.done?'h-done':'h-pending')+'">'+(i.done?'✅ ':'⬜ ')+escapeHtml(i.text)+'</span>').join('<br>');
      return '<div class="history-item"><div class="history-date">📅 '+(hh.plan_date||hh.date||'')+'</div><div class="history-items">'+(its||'<span style="color:var(--text-secondary)">(empty)</span>')+'</div></div>'
    }).join('')
  }catch(e){}
}

/* ─── Init ─── */
loadPlan();
loadHistory();

/* ─── Tab from URL hash ─── */
(function(){
  const hash=location.hash.replace('#','');
  if(['daily','monthly','yearly'].includes(hash))switchTab(hash);
})();

/* ─── Init indicator ─── */
window.addEventListener('load', ()=>{
  const activeTab = document.querySelector('.tab.active');
  if(activeTab) moveIndicator(activeTab.dataset.tab);
});
window.addEventListener('resize', ()=>{
  const activeTab = document.querySelector('.tab.active');
  if(activeTab) moveIndicator(activeTab.dataset.tab);
});
</script>
